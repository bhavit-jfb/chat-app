<!DOCTYPE html>
<html>
<head>
    <title>Group Chat</title>
</head>
<body>

<h2>{{ group.name }}</h2>

<div id="chat-box" style="border:1px solid black; height:300px; overflow:auto; padding:5px;">
    {% for msg in messages %}
        <div><strong>{{ msg.user_id }}</strong>: {{ msg.content }}</div>
    {% endfor %}
</div>

<br>

<form id="message-form">
    <input type="hidden" id="group_id" value="{{ group.id }}">
    <input type="text" id="message_input" placeholder="Type message" required>
    <button type="submit">Send</button>
</form>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const socket = io();

const group_id = "{{ group.id }}";
const user_id = "{{ current_user_id if current_user_id else '' }}";

const form = document.getElementById("message-form");
const chatBox = document.getElementById("chat-box");
const messageInput = document.getElementById("message_input");


/* join the group room */
socket.emit("join_group", {
    group_id: group_id
});


/* send message */
form.addEventListener("submit", function(e){
    e.preventDefault();

    const message = messageInput.value;

    socket.emit("send_message", {
        group_id: group_id,
        message: message,
        user_id: user_id
    });

    messageInput.value = "";
});


/* receive message instantly */
socket.on("receive_message", function(data){

    const msgDiv = document.createElement("div");

    msgDiv.innerHTML = "<strong>" + data.user_id + "</strong>: " + data.message;

    chatBox.appendChild(msgDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

});

</script>

</body>
</html>
