<!DOCTYPE html>

<html>

<head>
    <title>Group Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">

</head>

<body>
    <div class="video-bg">
        <video autoplay loop playsinline muted>
            <source src="{{ url_for('static', filename='video3.mp4') }}" type="video/mp4">
        </video>
    </div>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/dashboard'">←</button>
        <span class="group-title">{{ group.name }}</span>
        <div class="demo">
            <p>Demo</p>
        </div>
    </div>

    <div class="chat-container">

        <div id="chat-box">

            {% for msg in messages %}

            <div class="message {% if msg.user_id == current_user_id %}you{% else %}other{% endif %}">
                <div class="username">{{ msg.user.display_name }}</div>
                {{ msg.content }}
            </div>

            {% endfor %}

        </div>

        <form id="message-form" class="input-area">

            <input type="hidden" id="group_id" value="{{ group.slug }}">

            <input type="text" id="message_input" placeholder="Type a message..." required>

            <button type="submit">Send</button>

        </form>

    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>

        const socket = io();

        const group_id = "{{ group.slug }}";
        const user_id = "{{ current_user_id if current_user_id else '' }}";

        const form = document.getElementById("message-form");
        const chatBox = document.getElementById("chat-box");
        const messageInput = document.getElementById("message_input");

        /* join room */

        socket.emit("join_group", { group_id: group_id });

        /* send message */

        form.addEventListener("submit", function (e) {

            e.preventDefault();

            const message = messageInput.value;

            socket.emit("send_message", {
                group_id: group_id,
                message: message,
                user_id: user_id
            });

            messageInput.value = "";

        });

        /* receive message */

        socket.on("receive_message", function (data) {

    const msgDiv = document.createElement("div");

    /* decide message side */
    if (data.user_id == user_id) {
        msgDiv.className = "message you";
    } else {
        msgDiv.className = "message other";
    }

    const username = document.createElement("div");
    username.className = "username";
    username.innerText = data.user;

    const text = document.createElement("div");
    text.innerText = data.message;

    msgDiv.appendChild(username);
    msgDiv.appendChild(text);

    chatBox.appendChild(msgDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

});

    </script>

    <script>

        const username = localStorage.getItem("chat_name");

        fetch("/set-name", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: username
            })
        });

    </script>

</body>

</html>
